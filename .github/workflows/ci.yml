name: Build and Push to GitOps Registry

on:
  push:
    branches:
      - main

env:
  REGISTRY_NAME: "gitops-app-registry" # Your NEW dedicated registry name
  IMAGE_NAME: "chat-app"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build Docker Image
        run: |
          docker build -t registry.digitalocean.com/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest .

      - name: Push Image to DOCR
        run: |
          docker push registry.digitalocean.com/${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest
